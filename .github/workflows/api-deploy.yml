# Deploys apps/api to AWS.
#
# Prerequisites (set up in order before enabling):
#   1. AWS account + region (ap-south-1).
#   2. ECR repository "salary-api" (already exists at
#      182399698691.dkr.ecr.ap-south-1.amazonaws.com/salary-api).
#   3. GitHub OIDC identity provider registered in IAM
#      (https://token.actions.githubusercontent.com).
#   4. IAM role "github-salary-manager" trusted by that OIDC provider,
#      scoped to repo:<gh-org>/salary-manager:ref:refs/heads/main.
#      Permissions: ecr:* on the salary-api repo + ssm:SendCommand /
#      ssm:GetCommandInvocation on the EC2 instance.
#   5. EC2 instance (Amazon Linux 2023) running Docker + Compose plugin,
#      with the SSM agent enabled, in a public subnet behind the ALB.
#      Instance profile must allow ECR pull + SSM agent registration.
#
# Then set the following in GitHub:
#   Repo Variables:
#     AWS_REGION            ap-south-1
#     AWS_ACCOUNT_ID        182399698691
#     AWS_DEPLOY_ROLE_ARN   arn:aws:iam::182399698691:role/github-salary-manager
#     ECR_REPOSITORY        salary-api
#     EC2_INSTANCE_ID       i-0abc...
#     POSTGRES_DB           salary_manager
#     CORS_ORIGINS          https://<vercel-frontend-domain>
#     HR_USER_EMAIL         hr@acme.org
#   Repo Secrets:
#     POSTGRES_USER         e.g. salary
#     POSTGRES_PASSWORD     long random string
#     JWT_SECRET            `openssl rand -hex 32`
#     ANTHROPIC_API_KEY     sk-ant-...
#     HR_USER_PASSWORD      plaintext; only the seed step uses it, bcrypted before insert

name: api-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-deploy.yml"

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: api-deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy on EC2 via SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          GITHUB_SHA: ${{ github.sha }}
          # non-sensitive, shipped as variables
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          HR_USER_EMAIL: ${{ vars.HR_USER_EMAIL }}
          # sensitive — straight from GitHub Encrypted Secrets
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HR_USER_PASSWORD: ${{ secrets.HR_USER_PASSWORD }}
        run: |
          set -euo pipefail

          API_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"

          # Compose the .env locally so we don't fight quoting through
          # YAML → JSON → shell layers. Each var is printf'd individually
          # so values containing $, `, or \ survive intact.
          umask 077
          ENV_FILE=$(mktemp)
          {
            printf 'API_IMAGE=%s\n'         "$API_IMAGE"
            printf 'POSTGRES_USER=%s\n'     "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n'       "$POSTGRES_DB"
            printf 'DATABASE_URL=postgresql+psycopg://%s:%s@db:5432/%s\n' \
              "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$POSTGRES_DB"
            printf 'JWT_SECRET=%s\n'        "$JWT_SECRET"
            printf 'CORS_ORIGINS=%s\n'      "$CORS_ORIGINS"
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'HR_USER_EMAIL=%s\n'     "$HR_USER_EMAIL"
            printf 'HR_USER_PASSWORD=%s\n'  "$HR_USER_PASSWORD"
          } > "$ENV_FILE"

          COMPOSE_B64=$(base64 -w0 apps/api/docker-compose.prod.yml)
          ENV_B64=$(base64 -w0 "$ENV_FILE")
          rm -f "$ENV_FILE"

          jq -n \
            --arg compose "$COMPOSE_B64" \
            --arg envb64  "$ENV_B64" \
            --arg region  "$AWS_REGION" \
            --arg account "$AWS_ACCOUNT_ID" \
            '{
              commands: [
                "set -euo pipefail",
                "mkdir -p /opt/salary",
                "cd /opt/salary",
                ("echo " + $compose + " | base64 -d > /opt/salary/docker-compose.prod.yml"),
                "umask 077",
                ("echo " + $envb64 + " | base64 -d > /opt/salary/.env"),
                ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $account + ".dkr.ecr." + $region + ".amazonaws.com"),
                "docker compose -f docker-compose.prod.yml --env-file .env pull",
                # Bring db up and wait for the healthcheck before running one-shots.
                # --wait blocks until `service_healthy` is satisfied per the compose file.
                "docker compose -f docker-compose.prod.yml --env-file .env up -d --wait db",
                # One-shot migration against the now-healthy db.
                "docker compose -f docker-compose.prod.yml --env-file .env run --rm --no-deps api alembic upgrade head",
                # Idempotent seed — skips if the employees table is already populated.
                "docker compose -f docker-compose.prod.yml --env-file .env run --rm --no-deps api python -m scripts.seed",
                "docker compose -f docker-compose.prod.yml --env-file .env up -d",
                "docker image prune -f"
              ]
            }' > /tmp/ssm-params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy salary-api ${GITHUB_SHA:0:7}" \
            --parameters file:///tmp/ssm-params.json \
            --cloud-watch-output-config CloudWatchOutputEnabled=false \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM CommandId: $CMD_ID"

          # Wait for the EC2 to actually finish, then dump status + logs.
          # `aws ssm wait` returns non-zero on terminal failure, so trap it
          # and still fetch the invocation output for the workflow log.
          set +e
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION"
          WAIT_RC=$?
          set -e

          INV_JSON=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION" \
            --output json)

          STATUS=$(jq -r '.Status' <<<"$INV_JSON")
          echo "=== SSM Status: $STATUS ==="
          echo "--- stdout ---"
          jq -r '.StandardOutputContent' <<<"$INV_JSON"
          echo "--- stderr ---"
          jq -r '.StandardErrorContent' <<<"$INV_JSON"

          {
            echo "### salary-api deploy"
            echo ""
            echo "- Image: \`${API_IMAGE}\`"
            echo "- Instance: \`${EC2_INSTANCE_ID}\`"
            echo "- SSM CommandId: \`${CMD_ID}\`"
            echo "- Status: \`${STATUS}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" != "Success" ] || [ "$WAIT_RC" -ne 0 ]; then
            echo "::error::Deploy failed on EC2 (status=$STATUS, wait_rc=$WAIT_RC)"
            exit 1
          fi
